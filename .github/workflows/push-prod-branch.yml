# Unique name for this workflow
name: Deploy uat_psb branch to Production org

# Definition when the workflow should run
on:
    pull_request:
        types:
            - closed
        branches: [production]
        paths:
            - "force-app/**"

# Jobs to be executed
jobs:
    deploy-branch-to-production-org:
        runs-on: ubuntu-latest
        if: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request.merged == true }}
        steps:
            # Now we install nodejs in the VM, and specify version 14
            - uses: actions/setup-node@v3
              with:
                  node-version: "16"

            # Checkout the source code
            - name: "Checkout source code"
              uses: actions/checkout@v3
              with:
                  fetch-depth: 0

            # Install Salesforce CLI
            - name: "Install Salesforce CLI"
              run: |
                  wget https://developer.salesforce.com/media/salesforce-cli/sfdx/channels/stable/sfdx-linux-x64.tar.xz
                  mkdir ~/sfdx
                  tar xJf sfdx-linux-x64.tar.xz -C ~/sfdx --strip-components 1
                  echo "$HOME/sfdx/bin" >> $GITHUB_PATH
                  ~/sfdx/bin/sfdx version

            # install SFDX-Git-Delta plugin - https://github.com/scolladon/sfdx-git-delta
            - name: "Installing sfdx git delta"
              run: |
                  echo y | sfdx plugins:install sfdx-git-delta
                  sfdx plugins

            # Store secret for both otgs
            - name: "Populate auth file with SFDX_URL secret of the Production org"
              shell: bash
              run: |
                  echo ${{secrets.SFDX_PROD_URL}} > ./SFDX_PROD_URL.txt

            # Authenticate to org
            - name: "Authenticate to Production Org"
              run: sfdx auth:sfdxurl:store -f ./SFDX_PROD_URL.txt -s -a integration

            - name: "Create delta packages for new, modified or deleted metadata"
              run: |
                  mkdir changed-sources
                  sfdx sgd:source:delta --to "HEAD" --from "HEAD^" --output changed-sources/ --generate-delta --source force-app/

            # We do a check-only deploy and we only run the tests specified in the PR
            # If the env variable does equals 'RunSpecifiedTests', we know that there is a list of
            # tests that can be run

            # If the env variable equals all, we run all tests
            - name: "Deploy delta changes - run all tests"
              run: |
                  sfdx force:source:deploy -p "changed-sources/force-app" --testlevel RunLocalTests  --json

            - name: "Deploy destructive changes (if any) to Integration org"
              run: sfdx force:mdapi:deploy -d "changed-sources/destructiveChanges" --checkonly --ignorewarnings
