<template><lightning-card>
        <div slot="footer">
            Please go to this <a href={workAssignmentId}>Work Assignment</a> to check the generated file
        </div>
        <p class="slds-var-p-horizontal_small">
            <lightning-layout horizontal-align="space">
                <lightning-layout-item>
                    <lightning-button variant="base" label="CCS_Equifax" disabled={EquifaxDisabled} id="EquifaxId"
                        onclick={handleClick} class="slds-button slds-button_brand"
                        title="Generate CCS Canaccede Product file for Equifax">
                    </lightning-button>
                </lightning-layout-item>
                <lightning-layout-item>
                    <lightning-button variant="base" label="CCS_TransUnion" disabled={TransUnionDisabled}
                        id="TransUnionId" onclick={handleClick} class="slds-button slds-button_brand"
                        title="Generate CCS Canaccede Product file for TransUnion"></lightning-button>
                </lightning-layout-item>
                <lightning-layout-item>
                    <lightning-button variant="base" label="CIML_TransUnion" disabled={CreditBureauDisabled}
                        id="CreditBureauId" onclick={handleClick} class="slds-button slds-button_brand"
                        title="Generate ICT/LRT Distressed Product file"></lightning-button>
                </lightning-layout-item>
            </lightning-layout>
        </p>
    </lightning-card>
</template>
