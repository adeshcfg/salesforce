<template>
    <lightning-card>
        <lightning-spinner if:true={showSpinner} alternative-text="Loading..." variant="brand"> </lightning-spinner>
        <lightning-combobox
            class="slds-m-around_x-small"
            name="seller"
            label="Seller"
            placeholder="Select Seller"
            value={selectedSeller}
            options={sellerList}
            onchange={handleChange}
            required
        ></lightning-combobox>
        <lightning-button
            variant="brand"
            label="Generate Form"
            title="Generate Form"
            onclick={handleClick}
            disabled={disableButton}
            class="slds-m-around_x-small"
        ></lightning-button>
    </lightning-card>
</template>
